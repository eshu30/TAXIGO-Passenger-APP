name: taxigo
description: A taxi booking app similar to Chalo bus app
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_maps_flutter: ^2.5.0
  geolocator: ^10.1.0
  # Note: 'google_maps' is likely not needed if you have 'google_maps_flutter'. 
  # You can usually remove it.
  # google_maps: ^6.3.0
  permission_handler: ^11.0.1
  shared_preferences: ^2.2.2
  image_picker: ^1.0.4
  mobile_scanner: ^3.5.6
  http: ^1.5.0
  cupertino_icons: ^1.0.6
  path_provider: ^2.0.2
  supabase_flutter: ^2.10.1
  flutter_polyline_points: ^3.0.1
  flutter_dotenv: ^5.1.0
  intl: ^0.18.1 # Added for date formatting
  pointer_interceptor: ^0.10.1+2
  razorpay_flutter: ^1.4.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/images/
    - .env
